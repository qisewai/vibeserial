name: Build Windows

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/ui

      - name: Build frontend
        run: npm run build
        working-directory: apps/ui

      - name: Install Tauri CLI globally
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        run: tauri build -c src-tauri/tauri.conf.json
        working-directory: apps/desktop

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: vibeserial-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: vibeserial-windows-nsis
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
